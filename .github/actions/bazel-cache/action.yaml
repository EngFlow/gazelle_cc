name: Checkout Bazel server and disk caches
inputs:
  bazel-version:
    description: Used custom bazel version or .bazelversion file
    required: false
    default: '.bazelversion'
  bazelrc:
    description: Used custom rc file or .bazelrc file
    required: false
    default: '.bazelrc'
  disk-cache-max-size:
    description: Max size for disk cache GC (e.g. 5G)
    required: false
    default: '5G'
outputs:
  disk_cache_flags:
    description: Bazel flags for disk cache (use in bazel build/test)
runs:
  using: 'composite'
  steps:
    - name: Bazel server cache
      uses: actions/cache@v5
      with:
        path: ${{ runner.os == 'Linux' && '/home/runner/.cache/bazel' || '/Users/runner/Library/Caches/Bazel' }}
        # Richer hash than disk cache: server cache has no history, so it
        # changes often; separate blobs avoid overwriting caches for different
        # dep graphs.
        key: >-
          ${{format(
            'bazel-{0}-{1}-{2}-{3}',
            runner.os,
            inputs['bazel-version'],
            inputs.bazelrc,
            hashFiles('**/BUILD', '**/BUILD.bazel', '**/*.bzl', 'MODULE.bazel', '.bazelversion', '.bazelrc*')
          )}}
        restore-keys: |
          bazel-${{ runner.os }}-${{ inputs['bazel-version'] }}-${{ inputs.bazelrc }}-
    - name: Bazel disk cache
      uses: actions/cache@v5
      with:
        path: ${{ runner.os == 'Linux' && '/home/runner/.bazel-disk-cache' || '/Users/runner/.bazel-disk-cache' }}
        key: >-
          ${{format(
            'bazel-disk-{0}-{1}-{2}',
            runner.os,
            inputs['bazel-version'],
            inputs.bazelrc
          )}}
    - name: Set disk cache flags output
      run: |
        echo -n "disk_cache_flags=--disk_cache=$HOME/.bazel-disk-cache --experimental_disk_cache_gc_max_size=${{ inputs['disk-cache-max-size'] }}" >> "$GITHUB_OUTPUT"
      shell: bash
