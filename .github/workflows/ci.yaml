name: CI

on:
  pull_request:
  push:
    branches:
      - main 

concurrency:
  group: ci-${{ github.head_ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      # Keep in sync with configurations in .bcr/presubmit.yml. We cannot run
      # those tests in CI: they are post-release only. So we need to cover the
      # same configurations here.
      matrix:
        os: [ubuntu-24.04, macos-26]
        # "" means use the version in .bazelversion. Add 8.x if that changes.
        bazel-version: ["", "7.x", "last_rc"]
        include:
          # TODO #197: Turn on compilation tests again
          - bazel-version: "last_rc"
            custom-bazelrc: ".bazelrc-9"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      USE_BAZEL_VERSION: ${{ matrix.bazel-version }}
      BAZELRC: ${{ matrix.custom-bazelrc }}
      BAZEL_DISK_CACHE_MAX_SIZE: 5G
      BAZEL_DISK_CACHE_FLAGS: --disk_cache=$HOME/.bazel-disk-cache --experimental_disk_cache_gc_max_size=$BAZEL_DISK_CACHE_MAX_SIZE
    steps:
      - uses: actions/checkout@v4
      - name: Bazel server cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.os == 'Linux' && '/home/runner/.cache/bazel' || '/Users/runner/Library/Caches/Bazel' }}
          key: bazel-${{ runner.os }}-${{ matrix.bazel-version }}-${{ matrix.custom-bazelrc || 'default' }}-${{ hashFiles('**/BUILD', '**/BUILD.bazel', '**/*.bzl', 'MODULE.bazel', '.bazelversion', '.bazelrc*') }}
          restore-keys: |
            bazel-${{ runner.os }}-${{ matrix.bazel-version }}-${{ matrix.custom-bazelrc || 'default' }}-
      - name: Bazel disk cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.os == 'Linux' && '/home/runner/.bazel-disk-cache' || '/Users/runner/.bazel-disk-cache' }}
          key: bazel-disk-${{ runner.os }}-${{ matrix.bazel-version }}-${{ matrix.custom-bazelrc || 'default' }}
      - name: Build
        run: |
          bazel build ${{ env.BAZEL_DISK_CACHE_FLAGS }} //...
      - name: Test
        run: |
          bazel test --test_output=errors ${{ env.BAZEL_DISK_CACHE_FLAGS }} //...

  # Imitate the BCR test in .bcr/presubmit.yml. Keep in sync.
  bcr_test_module:
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-26]
        bazel-version: ["7.*", "8.*", "9.*"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    env:
      USE_BAZEL_VERSION: ${{ matrix.bazel-version }}
    defaults:
      run:
        working-directory: "example/bzlmod"
    steps:
      - uses: actions/checkout@v4
      - name: Run Gazelle
        run: "bazel run //:gazelle"
      - name: Build
        run: "bazel build //..."
      - name: Test
        run: "bazel test //..."

  test-indexers:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install Conan
        run: |
          python3 -m pip install --upgrade pip
          pip install conan
      - name: Execute manual integration tests
        run: bazel test --test_output=errors //index:integration_tests
          
  test-e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Execute end to end tests
        run: bash .github/workflows/test_e2e.sh
          
  license-headers:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/license_check.sh 
